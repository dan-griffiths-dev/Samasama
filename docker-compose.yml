services:
  postgres:
    image: postgres:16
    container_name: samasama-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: samasama
      POSTGRES_USER: samasama
      POSTGRES_PASSWORD: samasama
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
